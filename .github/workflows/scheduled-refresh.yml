name: Scheduled catalog refresh

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      XBOX_DEALS_MAX_PAGES: ${{ vars.XBOX_DEALS_MAX_PAGES || '4' }}
      STEAM_CRON_LIMIT: ${{ vars.STEAM_CRON_LIMIT || '250' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Microsoft Store and Steam
        run: npm run scheduled-refresh
